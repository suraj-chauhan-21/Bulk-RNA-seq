name: bulk_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R and essentials
  - r-base=4.3.3
  - r-essentials
  
  # Core bioinformatics tools
  - fastqc=0.12.1
  - multiqc=1.14
  - trimmomatic=0.39
  - hisat2=2.2.1
  - samtools=1.17
  - subread=2.0.3
  - sra-tools=3.0.7
  
  # R packages for data analysis
  - r-tidyverse
  - r-ggplot2
  - r-ggrepel
  - bioconductor-deseq2
  - bioconductor-clusterprofiler
  - bioconductor-org.hs.eg.db
  
  # Visualization
  - r-pheatmap
  - r-rcolorbrewer
  
  # Additional utilities
  - parallel
  - gnu-parallel
  - wget
  - curl
  
variables:
  CONDA_ENV_NAME: bulk_env
  R_VERSION: 4.3.3
